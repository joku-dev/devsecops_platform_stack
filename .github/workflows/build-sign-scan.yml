name: Build Sign and Scan Container

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - docker/**

jobs:
  build-sign-scan:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/dev-environment-v6-workspace

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./docker
          file: ./docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.0.0

      - name: Sign image with keyless Sigstore
        env:
          COSIGN_YES: "true"
        run: cosign sign ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}

      - name: Generate image SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: cyclonedx-json
          output-file: artifacts/sbom-image-cyclonedx.json

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: table
          output: trivy-image.txt

      - name: Upload image security artifacts
        uses: actions/upload-artifact@v4
        with:
          name: image-security-artifacts
          path: |
            artifacts/sbom-image-cyclonedx.json
            trivy-image.txt
