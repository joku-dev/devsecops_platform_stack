name: Validate Infrastructure

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare env file
        run: cp docker/.env.example docker/.env

      - name: Validate local compose
        run: docker compose -f docker/compose.local.yml --env-file docker/.env config

      - name: Validate remote compose
        run: docker compose -f docker/compose.remote.yml --env-file docker/.env config

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python security tooling
        run: |
          python -m pip install --upgrade pip
          pip install ansible ansible-lint yamllint pre-commit checkov

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r ansible/requirements.yml

      - name: Syntax check Ansible
        run: ansible-playbook -i ansible/inventory.ini ansible/playbook.yml --syntax-check

      - name: Lint Ansible
        run: ansible-lint ansible/playbook.yml

      - name: Lint YAML
        run: yamllint .

      - name: Run Checkov
        run: checkov -d . --config-file .checkov.yaml

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/Dockerfile

      - name: Setup OPA
        uses: open-policy-agent/setup-opa@v2
        with:
          version: latest

      - name: Install Conftest
        run: |
          curl -fsSL https://github.com/open-policy-agent/conftest/releases/download/v0.59.0/conftest_0.59.0_Linux_x86_64.tar.gz -o /tmp/conftest.tar.gz
          tar -xzf /tmp/conftest.tar.gz -C /tmp
          sudo mv /tmp/conftest /usr/local/bin/conftest
          conftest --version

      - name: Run Conftest on Kubernetes manifests
        run: conftest test k8s --policy policies

      - name: Install Syft
        run: |
          curl -fsSL https://github.com/anchore/syft/releases/download/v1.42.3/syft_1.42.3_linux_amd64.tar.gz -o /tmp/syft.tar.gz
          tar -xzf /tmp/syft.tar.gz -C /tmp
          sudo mv /tmp/syft /usr/local/bin/syft
          syft version

      - name: Generate SBOM
        run: |
          mkdir -p artifacts/sbom
          syft dir:. -o cyclonedx-json=artifacts/sbom/sbom-cyclonedx.json

      - name: Run pre-commit
        run: pre-commit run --all-files || true
