name: GitOps Validate

on:
  push:
    branches: [ main ]
    paths:
      - k8s/**
      - policies/**
      - .github/workflows/gitops-validate.yml
  pull_request:
    paths:
      - k8s/**
      - policies/**

jobs:
  validate-gitops:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup OPA
        uses: open-policy-agent/setup-opa@v2
        with:
          version: latest

      - name: Install Conftest
        run: |
          curl -fsSL https://github.com/open-policy-agent/conftest/releases/download/v0.59.0/conftest_0.59.0_Linux_x86_64.tar.gz -o /tmp/conftest.tar.gz
          tar -xzf /tmp/conftest.tar.gz -C /tmp
          sudo mv /tmp/conftest /usr/local/bin/conftest
          conftest --version

      - name: Render Argo CD kustomization
        run: kubectl kustomize k8s/platform/argocd >/dev/null

      - name: Render sample app kustomization
        run: kubectl kustomize k8s/apps/sample-app >/dev/null

      - name: Run Conftest
        run: conftest test k8s --policy policies
