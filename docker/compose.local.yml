services:
  workspace:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: devsecops-stack-workspace
    container_name: dev-workspace-local
    working_dir: /workspace/devsecops_platform_stack
    volumes:
      - ${WORKSPACE_ROOT:?Set WORKSPACE_ROOT to the host directory containing your repositories}:/workspace
      - dev_home:/home/devuser
      - /var/run/docker.sock:/var/run/docker.sock
    stdin_open: true
    tty: true
    environment:
      TZ: Europe/Berlin

  postgres:
    image: postgres:16
    container_name: dev-postgres-local
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: dev-redis-local
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: dev-minio-local
    profiles: ["platform"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  mailhog:
    image: mailhog/mailhog:latest
    container_name: dev-mailhog-local
    profiles: ["platform"]
    ports:
      - "1025:1025"
      - "8025:8025"

  loki:
    image: grafana/loki:3.1.1
    container_name: dev-loki-local
    profiles: ["observability"]
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail:3.1.1
    container_name: dev-promtail-local
    profiles: ["observability"]
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./observability/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.1.4
    container_name: dev-grafana-local
    profiles: ["observability"]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - loki

volumes:
  dev_home:
  postgres_data:
  minio_data:
  grafana_data:
